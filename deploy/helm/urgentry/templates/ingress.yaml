{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "urgentry.fullname" . }}
  labels:
    {{- include "urgentry.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Ingest traffic routes to the ingest service
          - path: /ingest
            pathType: Prefix
            backend:
              service:
                name: {{ include "urgentry.fullname" . }}-ingest
                port:
                  name: http
          # All other traffic routes to the API
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "urgentry.fullname" . }}-api
                port:
                  name: http
{{- end }}
