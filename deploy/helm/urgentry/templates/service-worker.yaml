apiVersion: v1
kind: Service
metadata:
  name: {{ include "urgentry.fullname" . }}-worker
  labels:
    {{- include "urgentry.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "urgentry.roleSelectorLabels" (dict "root" . "role" "worker") | nindent 4 }}
