apiVersion: v1
kind: Service
metadata:
  name: {{ include "urgentry.fullname" . }}-ingest
  labels:
    {{- include "urgentry.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "urgentry.roleSelectorLabels" (dict "root" . "role" "ingest") | nindent 4 }}
