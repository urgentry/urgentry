apiVersion: v1
kind: Service
metadata:
  name: {{ include "urgentry.fullname" . }}-api
  labels:
    {{- include "urgentry.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "urgentry.roleSelectorLabels" (dict "root" . "role" "api") | nindent 4 }}
