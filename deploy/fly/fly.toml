# Urgentry Tiny Mode on Fly.io
#
# Deploy:
#   cd apps/urgentry
#   fly launch --copy-config
#   fly deploy
#
# Your Urgentry instance will be at https://<app-name>.fly.dev

app = "urgentry"
primary_region = "iad"

[build]
  dockerfile = "deploy/docker-tiny/Dockerfile"

[env]
  URGENTRY_DATA_DIR = "/data"
  URGENTRY_HTTP_ADDR = ":8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "urgentry_data"
  destination = "/data"

[checks]
  [checks.readyz]
    type = "http"
    port = 8080
    path = "/readyz"
    interval = "10s"
    timeout = "3s"
