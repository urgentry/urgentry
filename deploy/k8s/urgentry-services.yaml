apiVersion: v1
kind: Service
metadata:
  name: urgentry-api
spec:
  selector:
    app: urgentry
    role: api
  ports:
    - name: api
      port: 8080
      targetPort: api
---
apiVersion: v1
kind: Service
metadata:
  name: urgentry-ingest
spec:
  selector:
    app: urgentry
    role: ingest
  ports:
    - name: ingest
      port: 8081
      targetPort: ingest
---
apiVersion: v1
kind: Service
metadata:
  name: urgentry-worker
spec:
  selector:
    app: urgentry
    role: worker
  ports:
    - name: worker
      port: 8082
      targetPort: worker
---
apiVersion: v1
kind: Service
metadata:
  name: urgentry-scheduler
spec:
  selector:
    app: urgentry
    role: scheduler
  ports:
    - name: scheduler
      port: 8083
      targetPort: scheduler
