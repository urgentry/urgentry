apiVersion: v1
kind: Secret
metadata:
  name: urgentry-secret
  annotations:
    urgentry.io/preflight: "required"
    urgentry.io/note: "REQUIRED: Replace every REPLACE_ME value before applying. The preflight check will reject insecure defaults."
type: Opaque
stringData:
  POSTGRES_USER: urgentry
  POSTGRES_PASSWORD: REPLACE_ME_POSTGRES_PASSWORD
  POSTGRES_DB: urgentry
  URGENTRY_CONTROL_DATABASE_URL: "postgres://urgentry:REPLACE_ME_POSTGRES_PASSWORD@postgres:5432/urgentry?sslmode=disable"
  URGENTRY_TELEMETRY_DATABASE_URL: "postgres://urgentry:REPLACE_ME_POSTGRES_PASSWORD@postgres:5432/urgentry?sslmode=disable"
  MINIO_ROOT_USER: minio
  MINIO_ROOT_PASSWORD: REPLACE_ME_MINIO_PASSWORD
  URGENTRY_S3_ACCESS_KEY: minio
  URGENTRY_S3_SECRET_KEY: REPLACE_ME_MINIO_PASSWORD
  URGENTRY_BOOTSTRAP_EMAIL: admin@urgentry.local
  URGENTRY_BOOTSTRAP_PASSWORD: REPLACE_ME_BOOTSTRAP_PASSWORD
  URGENTRY_BOOTSTRAP_PAT: REPLACE_ME_BOOTSTRAP_PAT
  URGENTRY_METRICS_TOKEN: REPLACE_ME_METRICS_TOKEN
