name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
  cancel-in-progress: false

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  launch-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
          cache-dependency-path: |
            go.sum

      - name: Run Tiny launch gate (required before release)
        run: make tiny-launch-gate

  build-binaries:
    needs: launch-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
          cache-dependency-path: |
            go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ARTIFACT="urgentry-${RELEASE_VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          VERSION="${RELEASE_VERSION}" bash ./scripts/build-urgentry.sh --output "dist/${ARTIFACT}"

          mkdir -p staging
          cp "dist/${ARTIFACT}" staging/urgentry
          tar -C staging -czf "dist/${ARTIFACT}.tar.gz" urgentry
          rm -rf staging

      - name: Upload platform artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6

      - name: Download all platform artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum ./* > SHA256SUMS

      - name: Verify checksums
        run: |
          cd dist
          sha256sum -c SHA256SUMS

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: urgentry-${{ env.RELEASE_VERSION }}-dist
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  docker:
    if: github.event_name == 'push'
    needs: launch-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/urgentry
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_VERSION }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.RELEASE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
