name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  launch-gate:
    if: github.repository == 'urgentry/urgentry' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache-dependency-path: go.sum
      - name: Install launch-gate tools
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: make tiny-launch-gate

  build:
    needs: launch-gate
    if: github.repository == 'urgentry/urgentry' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache-dependency-path: go.sum
      - name: Extract release notes from changelog
        run: bash ./scripts/release-notes-from-changelog.sh "${GITHUB_REF_NAME}" > release-notes.md
      - name: Build release artifacts
        run: make release VERSION="${GITHUB_REF_NAME}"
      - uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md

  docker:
    needs: launch-gate
    if: github.repository == 'urgentry/urgentry' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/urgentry/urgentry
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish:
    needs:
      - build
      - docker
    if: github.repository == 'urgentry/urgentry' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          name: release-artifacts
      - uses: actions/download-artifact@v8
        with:
          path: .
          name: release-notes
      - uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: dist/*
