name: Tiny Launch Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tiny-launch-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache-dependency-path: go.sum
      - name: Install launch-gate tools
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5
      - run: make tiny-launch-gate
